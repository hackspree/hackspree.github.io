
<!doctype html>
<html lang="en" style="margin:0;padding:0;background:#000 !important;">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="color-scheme" content="dark">
    <title>Mohamed A. Fouad — On an AI/Software Engineering hackspree!</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
            min-width: 100% !important;
            min-height: 100% !important;
            background: #000 !important;
            color: #fff !important;
        }

        body {
            position: relative;
            overflow: hidden;
            font-family: 'Orbitron', Arial, sans-serif;
        }

        .bg {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 0;
        }

        .wrap {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px;
            box-sizing: border-box;
        }

        .layout {
            width: min(1400px, 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-side {
            width: 20%;
            min-width: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: visible;
            padding: 16px 8px 16px 16px;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .logo {
            display: block;
            width: auto;
            height: auto;
            max-width: 156vh;
            max-height: 117%;
            transform: rotate(-90deg) scale(1.15);
            transform-origin: center center;
        }

        .content-side {
            width: 80%;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 48px 48px 48px 8px;
            box-sizing: border-box;
        }

        .content {
            width: 100%;
            max-width: 640px;
            margin: 0;
        }

        h3 {
            margin: 0;
            font-size: clamp(1.8rem, 3vw, 2.6rem);
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #fff;
            line-height: 1.2;
        }

        .role {
            margin: 20px 0 0;
            max-width: 36ch;
            font-size: 0.78rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: #9ca3af;
            line-height: 1.9;
        }

        .quote-block {
            margin: 42px 0 0;
            max-width: 34ch;
        }

        .quote {
            margin: 0;
            font-size: 1rem;
            color: #fff;
            line-height: 1.9;
            position: relative;
        }

        .socials {
            margin: 28px 0 0;
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .socials a {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #9ca3af;
            font-size: 1.35rem;
            text-decoration: none;
            transition: color 0.2s ease, transform 0.2s ease, opacity 0.2s ease;
        }

        .socials a::after,
        .socials a::before {
            position: absolute;
            left: 50%;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.18s ease, transform 0.18s ease, visibility 0s linear 0.18s;
        }

        .socials a::after {
            content: attr(data-tooltip);
            top: calc(100% + 16px);
            transform: translate(-50%, -6px);
            padding: 8px 12px;
            border: 1px solid rgba(156, 163, 175, 0.28);
            border-radius: 999px;
            background: rgba(17, 24, 39, 0.96);
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.4);
            color: #e5e7eb;
            font-size: 0.62rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .socials a::before {
            content: "";
            top: calc(100% + 10px);
            transform: translate(-50%, -6px) rotate(45deg);
            width: 10px;
            height: 10px;
            border-left: 1px solid rgba(156, 163, 175, 0.28);
            border-top: 1px solid rgba(156, 163, 175, 0.28);
            background: rgba(17, 24, 39, 0.96);
        }

        .socials a:hover {
            color: #fff;
            transform: translateY(-1px);
        }

        .socials a:hover::after,
        .socials a:hover::before,
        .socials a:focus-visible::after,
        .socials a:focus-visible::before {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, 0);
            transition-delay: 1.8s;
        }

        .socials a:focus-visible {
            color: #fff;
            outline: none;
            transform: translateY(-1px);
        }

        .socials a:focus-visible::before {
            transform: translate(-50%, 0) rotate(45deg);
        }

        .socials a:hover::before {
            transform: translate(-50%, 0) rotate(45deg);
        }

        .socials a.msc i {
            font-size: 1.30rem;
            opacity: 0.9;
            transform: scale(0.9);
            display: inline-block;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .socials a.msc:hover i {
            opacity: 0.9;
            transform: scale(1);
        }

        @media (max-width: 900px) {
            .wrap {
                padding: 24px;
            }

            .layout {
                flex-direction: column;
                width: 100%;
            }

            .logo-side,
            .content-side {
                width: 100%;
                min-width: 0;
                justify-content: center;
            }

            .logo-side {
                min-height: 28vh;
                padding: 24px 16px 8px;
            }

            .logo {
                transform: none;
                max-width: 252px;
                max-height: 206px;
            }

            .content-side {
                padding: 24px 28px 48px;
                text-align: center;
            }

            .content,
            .role,
            .quote-block {
                max-width: 100%;
                margin-left: auto;
                margin-right: auto;
            }

            .socials {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="bg"></div>

    <main class="wrap">
        <div class="layout">
            <aside class="logo-side">
                <img src="logo.png" alt="Logo" class="logo">
            </aside>

            <section class="content-side">
                <div class="content">
                    <h3>Mohamed A. Fouad</h3>

                    <p class="role">
                        On an engineering hackspree — Vim and blue switches all the way!
                    </p>

                    <figure class="quote-block">
                        <blockquote class="quote">
                            Engineering speed is the ultimate competitive advantage!
                        </blockquote>
                    </figure>

                    <div class="socials" aria-label="Social links">
                        <a href="https://github.com/moresearch"
                           target="_blank"
                           rel="noopener noreferrer"
                           aria-label="GitHub"
                           data-tooltip="Inspect the hackspree on GitHub">
                            <i class="fa-brands fa-github"></i>
                        </a>
                        <a href="https://x.com/maf_hackspree"
                           target="_blank"
                           rel="noopener noreferrer"
                           aria-label="X"
                           data-tooltip="Catch the latest sparks on X">
                            <i class="fa-brands fa-x-twitter"></i>
                        </a>
                        <a href="https://www.linkedin.com/in/mo-fouad-425a8b262/"
                           target="_blank"
                           rel="noopener noreferrer"
                           aria-label="LinkedIn"
                           data-tooltip="See the polished side on LinkedIn">
                            <i class="fa-brands fa-linkedin-in"></i>
                        </a>
                        <a href="https://discord.gg/hd6K2mpM"
                           target="_blank"
                           rel="noopener noreferrer"
                           aria-label="Discord"
                           data-tooltip="Join the signal on Discord">
                            <i class="fa-brands fa-discord"></i>
                        </a>
                        <a href="https://blog.hackspree.com"
                           target="_blank"
                           rel="noopener noreferrer"
                           aria-label="Blog"
                           data-tooltip="Read the long-form build logs">
                            <i class="fa-solid fa-blog"></i>
                        </a>
                        <a href="https://repositorio.ufu.br/handle/123456789/47974"
                           class="msc"
                           target="_blank"
                           rel="noopener noreferrer"
                           aria-label="MSc Thesis"
                           data-tooltip="Dive into the research roots">
                            <i class="fa-solid fa-user-graduate"></i>
                        </a>
                    </div>
                </div>
            </section>
        </div>
    </main>
</body>
</html>
