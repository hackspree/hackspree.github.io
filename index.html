<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="color-scheme" content="dark only">
  <title>Mo — Software Engineer</title>
  <style>
    :root{
      --bg:#000000;
      --text:#ffffff;
      --muted:#b3b3b3;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      min-height:100%;
      background:var(--bg);
      color:var(--text);
      font-family:Inter,Arial,Helvetica,sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:24px;
    }

    .wrap{
      width:100%;
      max-width:720px;
    }

    .logo{
      display:block;
      width:72px;
      height:auto;
      margin:0 auto 24px;
    }

    h1{
      margin:0;
      font-size:clamp(3rem,8vw,5rem);
      font-weight:700;
      letter-spacing:-0.05em;
      color:var(--text);
    }

    .role{
      margin:12px 0 0;
      font-size:18px;
      color:var(--muted);
    }

    .quote{
      margin:32px auto 0;
      max-width:620px;
      font-size:22px;
      line-height:1.4;
      color:var(--text);
      font-style:italic;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <img src="logo.png" alt="Logo" class="logo">
    <h1>Mo</h1>
    <p class="role">Software Engineer</p>
    <p class="quote">“Simplicity is a prerequisite for reliability.”</p>
  </main>
</body>
</html>
