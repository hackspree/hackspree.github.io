
<!doctype html>
<html lang="en" style="margin:0;padding:0;background:#000 !important;">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="color-scheme" content="dark">
    <title>Mohamed A. Fouad — On an AI/Software Engineering hackspree!</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

    <style>
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
            min-width: 100% !important;
            min-height: 100% !important;
            background: #000 !important;
            color: #fff !important;
        }

        body {
            position: relative;
            overflow: hidden;
            font-family: 'Orbitron', Arial, sans-serif;
        }

        .bg {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 0;
        }

        .wrap {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            align-items: center;         /* vertical centering */
            justify-content: center;     /* center whole 20/80 block */
            padding: 32px;
            box-sizing: border-box;
        }

        .layout {
            width: min(1400px, 100%);
            display: flex;
            align-items: center;         /* center both columns vertically */
            justify-content: center;     /* center both columns horizontally */
        }

        .logo-side {
            width: 20%;
            min-width: 220px;
            display: flex;
            align-items: center;
            justify-content: center;     /* center logo inside left column */
            overflow: visible;
            padding: 16px 8px 16px 16px;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .logo {
            display: block;
            width: auto;
            height: auto;
            max-width: 156vh;
            max-height: 117%;
            transform: rotate(-90deg) scale(1.3);
            transform-origin: center center;
        }

        .content-side {
            width: 80%;
            display: flex;
            align-items: center;         /* center content vertically */
            justify-content: flex-start; /* keep content close to logo */
            padding: 48px 48px 48px 8px;
            box-sizing: border-box;
        }

        .content {
            width: 100%;
            max-width: 640px;
            margin: 0;
        }

        h3 {
            margin: 0;
            font-size: clamp(1.8rem, 3vw, 2.6rem);
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #fff;
            line-height: 1.2;
        }

        .role {
            margin: 20px 0 0;
            max-width: 36ch;
            font-size: 0.78rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: #9ca3af;
            line-height: 1.9;
        }

        .quote-block {
            margin: 42px 0 0;
            max-width: 34ch;
        }

        .quote {
            margin: 0;
            font-size: 1rem;
            color: #fff;
            line-height: 1.9;
            position: relative;
        }

        .quote::before,
        .quote::after {
            color: #666;
            font-size: 1.4em;
        }


        @media (max-width: 900px) {
            .wrap {
                padding: 24px;
            }

            .layout {
                flex-direction: column;
                width: 100%;
            }

            .logo-side,
            .content-side {
                width: 100%;
                min-width: 0;
                justify-content: center;
            }

            .logo-side {
                min-height: 28vh;
                padding: 24px 16px 8px;
            }

            .logo {
                transform: none;
                max-width: 286px;
                max-height: 234px;
            }

            .content-side {
                padding: 24px 28px 48px;
                text-align: center;
            }

            .content,
            .role,
            .quote-block {
                max-width: 100%;
                margin-left: auto;
                margin-right: auto;
            }
        }
    </style>
</head>
<body>
    <div class="bg"></div>

    <main class="wrap">
        <div class="layout">
            <aside class="logo-side">
                <img src="logo.png" alt="Logo" class="logo">
            </aside>

            <section class="content-side">
                <div class="content">
                    <h3>Mohamed A. Fouad</h3>

                    <p class="role">
                        On an engineering hackspree — Vim and blue switches all the way!

                        <blockquote class="quote">
                            Engineering speed is the ultimate competitive advantage! 
                        </blockquote>
                    </p>


                    <!--
                    <figure class="quote-block">
                        <blockquote class="quote">
                            Engineering speed is the ultimate competitive advantage!
                        </blockquote>
                    </figure>
                    -->
                </div>
            </section>
        </div>
    </main>
</body>
</html>
