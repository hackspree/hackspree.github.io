
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="color-scheme" content="dark only">
  <title>Mo — Software Engineer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#000;
      --text:#fff;
      --muted:#9ca3af;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      min-height:100%;
      background:var(--bg);
      color:var(--text);
      font-family:'Orbitron', Arial, sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:24px;
    }

    .wrap{
      width:100%;
      max-width:760px;
    }

    .logo{
      display:block;
      width:84px;
      height:auto;
      margin:0 auto 28px;
    }

    h1{
      margin:0;
      font-size:clamp(3rem,8vw,5.5rem);
      font-weight:700;
      letter-spacing:0.08em;
      text-transform:uppercase;
    }

    .role{
      margin:14px 0 0;
      font-size:15px;
      letter-spacing:0.18em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .quote{
      margin:36px auto 0;
      max-width:680px;
      font-size:18px;
      line-height:1.7;
      color:var(--text);
      opacity:.92;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <img src="logo.png" alt="Logo" class="logo">
    <h1>Mo</h1>
    <p class="role">Professional Software Engineer</p>
    <p class="quote">“Simplicity is a prerequisite for reliability.”</p>
  </main>
</body>
</html>
