<!doctype html>
<html lang="en" style="background:#ffffff !important;">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="color-scheme" content="light only">
  <title>Mo — Software Engineer</title>
  <style>
    html{
      background:#ffffff !important;
    }

    body{
      margin:0;
      min-height:100vh;
      background:#ffffff !important;
      color:#111111 !important;
      font-family: Arial, Helvetica, sans-serif;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
    }

    .wrap{
      width:100%;
      max-width:700px;
      padding:40px 24px;
      background:#ffffff !important;
    }

    .logo{
      display:block;
      width:72px;
      height:auto;
      margin:0 auto 24px;
    }

    h1{
      margin:0;
      font-size:56px;
      font-weight:700;
      letter-spacing:-0.04em;
      color:#111111 !important;
    }

    .role{
      margin:12px 0 0;
      font-size:18px;
      color:#444444 !important;
    }

    .quote{
      margin:32px 0 0;
      font-size:22px;
      color:#111111 !important;
      font-style:italic;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img src="logo.png" alt="Logo" class="logo">
    <h1>Mo</h1>
    <p class="role">Software Engineer</p>
    <p class="quote">“Simplicity is a prerequisite for reliability.”</p>
  </div>
</body>
</html>
