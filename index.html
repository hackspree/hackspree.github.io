<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mo — Software Engineer</title>
  <style>
    :root { --bg:#f6f7f9; --fg:#111; --muted:#666; --card:#fff; --line:#e8e8e8; }
    * { box-sizing:border-box; }
    body {
      margin:0; font-family:Inter,system-ui,-apple-system,sans-serif;
      background:var(--bg); color:var(--fg); min-height:100vh;
      display:grid; place-items:center;
    }
    main {
      width:min(720px,92vw); background:var(--card); border:1px solid var(--line);
      border-radius:24px; padding:48px 28px; text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,.05);
    }
    img { width:96px; height:96px; object-fit:contain; display:block; margin:0 auto 24px; }
    h1 { margin:0; font-size:clamp(2rem,5vw,3.2rem); letter-spacing:-.04em; }
    p { margin:14px 0 0; color:var(--muted); font-size:1.05rem; }
    blockquote {
      margin:32px auto 0; padding-top:24px; border-top:1px solid var(--line);
      font-size:1.1rem; font-style:italic; color:var(--fg);
    }
  </style>
</head>
<body>
  <main>
    <img src="logo.png" alt="Logo" />
    <h1>Mo</h1>
    <p>Software Engineer</p>
    <p>Building calm, reliable systems.</p>
    <blockquote>“Simplicity is a prerequisite for reliability.”</blockquote>
  </main>
</body>
</html>
