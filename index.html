
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="color-scheme" content="light only" />
  <title>Mo — Software Engineer</title>
  <style>
    :root {
      --bg: #f5f7fa;
      --card: #ffffff;
      --text: #111111;
      --muted: #5f6b7a;
      --line: #e7ebf0;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg) !important;
      color: var(--text) !important;
      font-family: Inter, Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    main {
      width: min(720px, 92vw);
      background: var(--card) !important;
      color: var(--text) !important;
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 56px 32px;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0,0,0,0.06);
    }

    img {
      display: block;
      width: 96px;
      height: 96px;
      object-fit: contain;
      margin: 0 auto 24px;
    }

    h1 {
      margin: 0;
      font-size: 56px;
      letter-spacing: -0.04em;
      color: var(--text) !important;
    }

    p {
      margin: 12px 0 0;
      font-size: 18px;
      color: var(--muted) !important;
    }

    blockquote {
      margin: 32px 0 0;
      padding-top: 24px;
      border-top: 1px solid var(--line);
      font-size: 20px;
      font-style: italic;
      color: var(--text) !important;
    }
  </style>
</head>
<body>
  <main>
    <img src="logo.png" alt="Logo">
    <h1>Mo</h1>
    <p>Software Engineer</p>
    <blockquote>“Simplicity is a prerequisite for reliability.”</blockquote>
  </main>
</body>
</html>
