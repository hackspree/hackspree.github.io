<!doctype html>
<html lang="en" style="margin:0;padding:0;background:#000 !important;">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <meta name="color-scheme" content="dark">
        <title>Mohamed A. Fouad — On an AI/Software Engineering hackspree!</title>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

        <style>
html, body {
    margin: 0 !important;
    padding: 0 !important;
    width: 100% !important;
    min-width: 100% !important;
    min-height: 100% !important;
    background: #000 !important;
    color: #fff !important;
}

    body {
        position: relative;
        overflow: hidden;
        font-family: 'Orbitron', Arial, sans-serif;
    }

    .bg {
        position: fixed;
        inset: 0;
        background: #000;
        z-index: 0;
    }

    .wrap {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 32px;
    }

    .content {
        width: 100%;
        max-width: 900px;
    }

    .logo {
        display: block;
        margin: 0 auto 32px;
    }

    h1 {
        margin: 0;
        font-size: clamp(4rem, 10vw, 7rem);
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #fff;
    }

    .role {
        margin: 16px 0 0;
        font-size: 16px;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: #9ca3af;
    }

    .quote {
        margin: 42px auto 0;
        max-width: 760px;
        font-size:.12rem;
        color: #fff;
        opacity: 0.95;
    }

    h3{
        margin:0;
        font-size:clamp(1.5rem,3vw,2.1rem);
        font-weight:600;
        letter-spacing:.08em;
        text-transform:uppercase;
        color:#fff;
    }

    .quote-block{
        margin:42px auto 0;
        max-width:760px;
    }

    .quote{
        margin:0;
        font-size:0.9rem;
        font-style:italic;
        color:#fff;
        position:relative;
    }

    .quote::before,
    .quote::after{
        color:#666;
        font-size:1.4em;
    }

    .quote::before{ content:"“ "; }
    .quote::after{ content:" ”"; }

    .quote-author{
        margin-top:14px;
        font-size:.72rem;
        letter-spacing:.22em;
        text-transform:uppercase;
        color:#8b8b8b;
    }
        </style>
    </head>
    <body>
        <div class="bg"></div>

        <main class="wrap">
            <section class="content">
                <img src="logo.png" alt="Logo" class="logo">
                <h3>Mohamed A. Fouad</h3>
                <!--<p 
                <p class="role">"Speed is the ultimate competitive advantage!"</p>
                    class="role">On an AI/Software Engineering hackspree!</p>
                    Make every single detail perfect, limit the number of details.
                -->
                <p class="role">
                On an engineering hackspree — Vim and blue switches all the way!
                </p>

                <figure class="quote-block">
                    <blockquote class="quote">
                        Simplicity is a prerequisite for reliability.
                    </blockquote>
                    <figcaption class="quote-author">— Edsger W. Dijkstra</figcaption>
                </figure>
            </section>
        </main>
    </body>
</html>
